<!DOCTYPE html>
<html>
<head>
  <title>Movie-to-Soundtrack Finder</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #121212;
      color: #f5f5f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 { color: #00acee; }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background-color: #00acee;
      color: white;
      cursor: pointer;
    }

    button:hover { background-color: #008ec1; }

    .container {
      max-width: 900px;
      margin: 40px auto;
      text-align: left;
    }

    .movie-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.3);
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    .movie-poster {
      width: 200px;
      border-radius: 8px;
    }

    .movie-info { flex: 1; }

    #youtubeResults {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .video-card {
      background: #1a1a1a;
      border-radius: 8px;
      padding: 6px 10px;
      margin: 5px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      flex: 1 1 45%;
      min-width: 250px;
    }

    .video-card p {
      font-size: 14px;
      flex: 1;
      margin: 0;
      color: #ddd;
    }

    iframe {
      border-radius: 6px;
      width: 160px;
      height: 90px;
    }

    h2 {
      color: #00acee;
      border-bottom: 2px solid #00acee;
      padding-bottom: 5px;
    }

    footer {
      margin-top: 40px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <h1>🎬 Movie-to-Soundtrack Finder</h1>
  <p>Search any movie.</p>

  <input type="text" id="searchBox" placeholder="Enter a movie title...">
  <button onclick="searchMovie()">Search</button>

  <div class="container">
    <div id="movieResults"></div>
  </div>

  <footer>
    Powered by TMDb & YouTube APIs — for educational use only
  </footer>

  <script>
    const tmdbKey = "71421e241b142b2835dc1fcd3e8e5327";
    const ytKey   = "AIzaSyDKLqX_llwkh0y22s7s68m7BGSrQZy3Kcw";

    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    async function searchMovie() {
      const query = document.getElementById("searchBox").value.trim();
      const movieDiv = document.getElementById("movieResults");
      movieDiv.innerHTML = "";

      if (!query) {
        movieDiv.innerHTML = "<p>Please type a movie title.</p>";
        return;
      }

      try {
        const url = `https://api.themoviedb.org/3/search/movie?api_key=${tmdbKey}&query=${encodeURIComponent(query)}`;
        const data = await fetchJSON(url);

      if (!data.results.length) {
        movieDiv.innerHTML = "<p>No movie found.</p>";
        return;
      }

      const movie = data.results[0];

      renderMovie(movie);
      await getTrailer(movie.id);
      await getSoundtracks(movie.title);

      } catch (err) {
      movieDiv.innerHTML = "<p>Error loading movie info.</p>";
      }
  }

  function renderMovie(movie) {
    const movieDiv = document.getElementById("movieResults");

    const poster = movie.poster_path
      ? `https://image.tmdb.org/t/p/w300${movie.poster_path}`
      : "https://via.placeholder.com/300x450?text=No+Poster";

    movieDiv.innerHTML = `
      <div class="movie-card">
        <img src="${poster}" class="movie-poster">
        <div class="movie-info">
          <h2>${movie.title}</h2>
          <p><strong>Release:</strong> ${movie.release_date || "Unknown"}</p>
          <p>${movie.overview || "No description available."}</p>
          <div id="trailerSection"></div>
          <div id="youtubeResults"></div>
        </div>
      </div>
    `;
  }
    

    // 🎞️ Trailer
    async function getTrailer(movieId) {
      const trailerDiv = document.getElementById("trailerSection");
      trailerDiv.innerHTML = "<h3>🎞️ Trailer</h3><p>Loading...</p>";

      const trailerUrl = `https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${tmdbKey}`;

      try {
      const data = await fetchJSON(trailerUrl); 
      const trailer = data.results.find(
        v => v.site === "YouTube" && v.type === "Trailer"
      );

      trailerDiv.innerHTML = trailer
        ? `<h3>🎞️ Trailer</h3>
           <iframe src="https://www.youtube.com/embed/${trailer.key}?modestbranding=1&controls=1" allowfullscreen></iframe>`
        : "<p>No trailer found.</p>";
      } catch (err) {
        trailerDiv.innerHTML = "<p>Error loading trailer.</p>";
      }
    }
    // Potential reusable YouTube Search
    async function searchYouTube(q, max = 3) {
      const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&maxResults=${max}&type=video&key=${ytKey}`;
      const data = await fetchJSON(url);
      return data.items || [];
    }

    // 🎧 Two YouTube Soundtracks
    async function getSoundtracks(title) {
      const ytDiv = document.getElementById("youtubeResults");
      ytDiv.innerHTML = "<p>Loading soundtrack...</p>";

      const ytUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(title + " original motion picture soundtrack")}&maxResults=2&type=video&key=${ytKey}`;

      try {
        let results = await searchYouTube(`${title} original motion picture soundtrack`, 3);
        if (results.length === 0) {
          results = await searchYouTube(`${title} OST`, 3);
      }

      if (results.length === 0) {
        ytDiv.innerHTML = "<p>No soundtrack videos found.</p>";
        return;
      }

      ytDiv.innerHTML = "<h3>🎧 YouTube Soundtracks</h3>";

      for (const video of results) {
        ytDiv.innerHTML += `
          <div class="video-card">
            <p>${video.snippet.title}</p>
            <iframe src="https://www.youtube.com/embed/${video.id.videoId}?modestbranding=1&controls=1" allowfullscreen></iframe>
            </div>
          `;
        }
      } catch (err) {
        ytDiv.innerHTML = "<p>Error loading soundtrack videos.</p>";
      }
    }
  </script>
</body>
</html>
